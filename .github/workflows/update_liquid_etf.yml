name: Update Liquid ETF Baseline

on:
  schedule:
    # Mon-Fri at 22:00 UTC (after US market close, before next IST morning)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance

      - name: Run baseline update
        run: python update_liquid_etf.py

      - name: Commit & push baseline
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/liquid_etf_baseline.csv
          git diff --staged --quiet || git commit -m "auto: liquid ETF baseline $(date -u +'%Y-%m-%d')"
          git push
