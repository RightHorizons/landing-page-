name: Daily FII DII Scrape

on:
  schedule:
    - cron: '30 14 * * 1-5'  # 8:00 PM IST, weekdays only
  workflow_dispatch:          # Manual run button

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/fii_dii_checkpoint.csv
          git diff --staged --quiet || git commit -m "Auto-update daily FII/DII data $(date +'%Y-%m-%d')"
          git push
